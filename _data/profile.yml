short_bio: >-
  I am a fourth-year Ph.D. student at the <a href="https://irc.cs.sdu.edu.cn" target="_blank">Interdisciplinary Research Center (IRC)</a> of Shandong University, under the supervision of Prof. <a href="https://irc.cs.sdu.edu.cn/~lulin/index.html" target="_blank">Lin Lu</a>. I am also fortunate to receive guidance from Dr. <a href="https://xueyuhanlang.github.io/" target="_blank">Yang Liu</a>. Before that, I received my Bachelor's degree in 2022 from the School of Computer Science and Technology, Shandong University, under the supervision of Prof. <a href="https://irc.cs.sdu.edu.cn/~lulin/index.html" target="_blank">Lin Lu</a>. My research focuses on intelligent simulation and metamaterial design, with an emphasis on the computational design and optimization of multifunctional microstructures.

